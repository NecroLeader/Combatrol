events { worker_connections 1024; }

http {
    # HTTP → redirige a HTTPS + sirve challenge de certbot
    server {
        listen 80;
        server_name combatrol.duckdns.org;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name combatrol.duckdns.org;

        ssl_certificate     /etc/letsencrypt/live/combatrol.duckdns.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/combatrol.duckdns.org/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        location / {
            proxy_pass         http://combatrol_app:8000;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }
    }
}
