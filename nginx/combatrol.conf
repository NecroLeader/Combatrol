# Rate limiting: 20 req/s por IP
limit_req_zone $binary_remote_addr zone=combatrol:10m rate=20r/s;

server {
    listen 80;
    server_name combatrol.duckdns.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name combatrol.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/combatrol.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/combatrol.duckdns.org/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    access_log /var/log/nginx/combatrol_access.log;
    error_log  /var/log/nginx/combatrol_error.log;

    client_max_body_size 1M;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self';" always;

    location / {
        limit_req zone=combatrol burst=40 nodelay;
        limit_req_status 429;

        proxy_pass         http://combatrol_app:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
