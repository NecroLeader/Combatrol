services:
  combatrol:
    build: .
    container_name: combatrol_app
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    container_name: combatrol_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - combatrol
